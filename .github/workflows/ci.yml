name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev

      # Single source of truth: the exact gate contributors/agents run locally
      # (scripts/gate.sh), invoked in --check mode so unformatted / lint / type /
      # test issues fail the build. Keeping CI and the local gate as one script
      # means they cannot drift — the root cause of "passed locally, red on main".
      - name: Quality gate (ruff lint + format + mypy + pytest)
        run: ./scripts/gate.sh --check

      # The deterministic gate above runs keyless on the `fake` backend, so it
      # never loads the real-LLM runtime deps (the `anthropic` SDK and
      # `claude-agent-sdk`), which are imported lazily — a missing/undeclared one
      # would slip past every test and only explode on a live run (esim-sr3).
      # Install the `bench` extra and import exactly those runtime deps so a gap
      # fails the build here. No key / network needed (client creation is lazy).
      - name: Real-LLM runtime import smoke (bench extra)
        run: |
          uv sync --extra dev --extra bench
          uv run python scripts/import_smoke.py

  # Runs in parallel with `quality` (not inside gate.sh): the keyless e2e wiring
  # smoke + full baseline check, so a fidelity regression is caught on the PR that
  # causes it. Kept out of gate.sh to preserve "gate output = quality job output"
  # and keep the ~20s local loop fast; the golden-cell baseline test in the gate
  # already catches most drift, this job adds the matrix cell + e2e wiring on top.
  # It is keyless and deterministic (fake backend), so no key / network is needed.
  e2e-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev

      # Invoke the Makefile target rather than re-listing the two commands here:
      # `make e2e-smoke` is their single definition, so local and CI cannot drift.
      # make is preinstalled on ubuntu-latest.
      - name: Keyless e2e smoke + baseline check
        run: make e2e-smoke
